    FLAME: 3
    LOOTING: 2
  SPIDER:
    BANE_OF_ARTHROPODS: 4
    SWEEPING_EDGE: 2
    SHARPNESS: 1
  ENDERMAN:
    EFFICIENCY: 3
    SILK_TOUCH: 2
    FORTUNE: 3
  WITHER_SKELETON:
    FIRE_PROTECTION: 2
    SMITE: 4
