# LoyCustomMobs – Tables de loot avancées
# Chaque mob dispose de quatre catégories :
#  - guaranteed : loot principal garanti
#  - secondary  : 20–50 % de chance
#  - rare       : 1–5 % de chance
#  - legendary  : <= 1 % de chance
#
# Les livres enchantés utilisent les pools définis dans "enchantment-pools".

rarity-settings:
  COMMON:
    enchant-count:
      min: 1
      max: 1
    levels:
      min: 1
      max: 2
  UNCOMMON:
    enchant-count:
      min: 1
      max: 2
    levels:
      min: 1
      max: 2
  RARE:
    enchant-count:
      min: 2
      max: 2
    levels:
      min: 3
      max: 4
  EPIC:
    enchant-count:
      min: 2
      max: 3
    levels:
      min: 5
      max: 5
    special-enchants:
      - MENDING
      - INFINITY
  LEGENDARY:
    enchant-count:
      min: 2
      max: 3
    levels:
      min: 5
      max: 5
    special-enchants:
      - MENDING
      - INFINITY
  MYTHIC:
    enchant-count:
      min: 3
      max: 3
    levels:
      min: 5
      max: 5
    special-enchants:
      - MENDING
      - INFINITY

enchantment-pools:
  DEFAULT:
    PROTECTION: 3
    UNBREAKING: 2
    SHARPNESS: 1
  ZOMBIE:
