# Configuration NuvaPeoples
# Plugin de classes/peuples Minecraft PaperMC 1.21.8

# Mode debug (affiche les informations dans la console)
debug: false

# Configuration base de données
# Types supportés: "mysql", "sqlite" 
database:
  type: "sqlite"  # mysql ou sqlite
  # Configuration MySQL (utilisée si type = "mysql")
  mysql:
    host: "localhost"
    port: 3306
    database: "nuva_peoples"
    username: "root"
    password: "password"
  # Configuration SQLite (utilisée si type = "sqlite")
  sqlite:
    file: "data.db"
  pool_size: 10

# Messages du plugin
messages:
  prefix: "&8[&3&lClasse&8]&r "
  classe_choisie: "&aVous avez choisi la classe &e{classe}&a !"
  classe_oubliee: "&cVous avez oublié votre classe et êtes redevenu une &7Âme errante&c."
  classe_actuelle: "&evotre classe actuelle : &a{classe}"
  aucune_classe: "&cVous n'avez aucune classe sélectionnée."
  passifs_actifs: "&ePassifs actifs :"
  classe_inexistante: "&cCette classe n'existe pas !"
  cooldown_actif: "&cCe passif est en cours de rechargement ! ({temps}s restantes)"
  pain_absorption: "&a+2 cœurs d'absorption pendant 10 secondes !"
  regeneration_active: "&aRégénération active !"
  resistance_active: "&aRésistance activée !"
  config_rechargee: "&aConfiguration rechargée avec succès !"
  pas_permission: "&cVous n'avez pas la permission d'utiliser cette commande."
  
# Configuration des cooldowns (en secondes)
cooldowns:
  pain_nourricier: 20
  serenite_lunaire: 60
  esprit_apaise: 45

# Configuration des passifs
passifs:
  # Bastorgnes (Orqs)
  frappe_lourde:
    enabled: true
    bonus_degats: 0.02 # +2%
  peau_fer:
    enabled: true
    reduction_degats: 0.05 # -5%
    
  # Tartinuits (Hobbits)
  pain_nourricier:
    enabled: true
    absorption_coeurs: 2
    duree_absorption: 10 # secondes
    cooldown: 20
  sante_florissante:
    enabled: true
    niveau_regeneration: 1
    
  # Sylvounets (Elfes)
  tir_sylvestre:
    enabled: true
    bonus_degats: 0.02 # +2%
  agilite_forestiere:
    enabled: true
    bonus_vitesse: 0.20 # +20%
    biomes_forestiers:
      # Forêts principales
      - "forest"
      - "birch_forest"
      - "dark_forest"
      - "old_growth_birch_forest"
      - "old_growth_pine_taiga"
      - "old_growth_spruce_taiga"
      # Jungles
      - "jungle"
      - "sparse_jungle"
      - "bamboo_jungle"
      # Taïgas
      - "taiga"
      - "snowy_taiga"
      # Variantes avec collines (si elles existent encore)
      - "windswept_forest"
      - "flower_forest"
      
  # Grosuki (Hommes panda/kitsunes)
  serenite_lunaire:
    enabled: true
    seuil_vie: 0.25 # <25% PV
    niveau_resistance: 1
    duree: 5 # secondes
    cooldown: 60
  esprit_apaise:
    enabled: true
    temps_accroupi: 3 # secondes
    niveau_regeneration: 2
    duree_regeneration: 5
    cooldown: 45
    
  # Bricobrak (Humains)
  outils_bricoleurs:
    enabled: true
    reduction_durabilite: 0.20 # -20%
  ressort_bricole:
    enabled: true
    niveau_jump_boost: 1
    
  # Miraziens (Hommes oiseaux)
  plume_legere:
    enabled: true
    reduction_degats_chute: 0.50 # -50%
  precision_aerienne:
    enabled: true
    chance_faiblesse: 0.10 # 10%
    duree_faiblesse: 3 # secondes
    niveau_faiblesse: 1

